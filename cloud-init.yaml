#cloud-config
# Runs once on first boot

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - htop

runcmd:
  # --- sysinfo install ---
  - |
    SYSINFO_VERSION="${sysinfo_version}"
    SYSINFO_URL="https://github.com/zemation/sysinfo/releases/download/$${SYSINFO_VERSION}/sysinfo-linux-amd64"
    echo "[cloud-init] Installing sysinfo $${SYSINFO_VERSION}..."
    curl -fsSL "$${SYSINFO_URL}" -o /usr/local/bin/sysinfo
    chmod +x /usr/local/bin/sysinfo
    echo "[cloud-init] sysinfo installed: $(/usr/local/bin/sysinfo --version 2>/dev/null || echo 'binary present')"

final_message: |
  Cloud-init complete.
  sysinfo installed at /usr/local/bin/sysinfo